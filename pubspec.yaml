name: OmniBook
description: Multi-Counter Booking System
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/app_logo.png


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true

  image_path: "assets/app_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#F8FAFC"
  adaptive_icon_foreground: "assets/app_logo.png"